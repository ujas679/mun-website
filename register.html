<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <style>
        body {
            background: #0b1c2c;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: gold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Register for MUN</h1>

    <input id="name" placeholder="Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="committee" placeholder="Committee"><br>
    <input id="country" placeholder="Country"><br>

    <button onclick="register()">Submit</button>

    <script>
        function register() {
            fetch("http://localhost:3000/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    committee: document.getElementById("committee").value,
                    country: document.getElementById("country").value
                })
            })
                .then(res => res.text())
                .then(data => alert(data));
        }
    </script>

</body>

</html>
